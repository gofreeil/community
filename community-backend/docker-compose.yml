services:
  strapi:
    build:
      context: .
      dockerfile: Dockerfile
    image: community-strapi:latest
    container_name: community-strapi
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_SSL: "false"
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 1337
    ports:
      - "1337:1337"
    volumes:
      - strapi-uploads:/opt/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:1337/_health',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - strapi-net

  strapi2:
    image: community-strapi:latest
    container_name: community-strapi2
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_SSL: "false"
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 1337
    ports:
      - "1338:1337"
    volumes:
      - strapi-uploads:/opt/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:1337/_health',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - strapi-net

  postgres:
    image: postgres:16-alpine
    container_name: community-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - strapi-net

volumes:
  postgres-data:
  strapi-uploads:

networks:
  strapi-net:
    driver: bridge
